name: Host2Play 续期

on:
  schedule:
    - cron: '0 0,11,22 * * *'    # 触发点: 00:00, 11:00, 22:00
    - cron: '30 5,16 * * *'      # 触发点: 05:30, 16:30
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      # ==========================================
      # 关键变更：用 Xray 替代 WARP
      # 不再使用 fscarmen/warp-on-actions
      # 改为下载 Xray 并使用 V2RAY_CONFIG 代理
      # ==========================================
      - name: 下载并启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          # 下载 Xray
          curl -sL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -q xray.zip && chmod +x xray
          
          # 写入配置文件
          echo "$V2RAY_CONFIG" > config.json
          
          # 启动 Xray
          ./xray run -c config.json &
          sleep 5
          
          # 验证代理是否正常
          echo "直连 IP：$(curl -s --max-time 5 ifconfig.me || echo '失败')"
          echo "代理 IP：$(curl -s --max-time 10 --socks5 127.0.0.1:10808 ifconfig.me || echo '代理失败，请检查 V2RAY_CONFIG')"

      # 注意：不再需要"修复 DNS"步骤
      # Xray 代理在应用层工作，不需要修改系统 DNS

      - name: 执行续订
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
